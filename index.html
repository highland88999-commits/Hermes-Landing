<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES LANDING - SHOP CLOTHING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hologram-blue: rgba(0, 243, 255, 0.6);
            --bloom-glow: rgba(0, 0, 0, 0.9);
            --text-glow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
        }

        /* Fullscreen Video Background */
        #video-background {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(0.5) contrast(1.1);
            transition: opacity 0.5s ease;
        }

        /* Digital Rain Canvas */
        #rain-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
        }

        header { text-align: center; margin-bottom: 60px; pointer-events: none; }
        h1 { color: #fff; letter-spacing: 10px; font-weight: 200; text-shadow: var(--text-glow); margin: 0; }
        p { color: var(--hologram-blue); letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; }

        .icon-container { display: flex; gap: 50px; }

        .hologram-card {
            width: 200px; height: 220px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 15px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .hologram-card:hover {
            border-color: #fff;
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        /* Icon Styling */
        .symbol-wrapper { position: relative; font-size: 4.5rem; color: #fff; }
        .bolt-overlay {
            position: absolute; top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem; color: #00f3ff;
            text-shadow: 0 0 15px #00f3ff;
        }

        .label { margin-top: 20px; color: #fff; font-size: 0.75rem; letter-spacing: 3px; opacity: 0.8; }
    </style>
</head>
<body onclick="playVideo()">

    <video muted loop id="video-background" preload="auto">
        <source src="https://github.com/highland88999-commits/Hermes-Landing/blob/main/media/grok_video_2026-03-11-17-05-08.mp4?raw=true" type="video/mp4">
    </video>

    <canvas id="rain-canvas"></canvas>

    <div class="overlay">
        <header>
            <h1>HERMES LANDING</h1>
            <p>Select your brand below</p>
        </header>

        <div class="icon-container">
            <a href="https://olympus-lac.vercel.app/" class="hologram-card">
                <div class="symbol-wrapper">
                    <i class="fa-solid fa-vest"></i>
                    <div class="bolt-overlay"><i class="fa-solid fa-bolt"></i></div>
                </div>
                <div class="label">OLYMPUS</div>
            </a>

            <a href="https://missacccom.pxf.io/oNq1Po" class="hologram-card">
                <div class="symbol-wrapper">
                    <i class="fa-solid fa-person-dress"></i>
                </div>
                <div class="label">BRIDAL EXCLUSIVE</div>
            </a>
        </div>
    </div>

    <script>
        // 1. Instant Video Trigger
        const video = document.getElementById('video-background');
        function playVideo() {
            if (video.paused) {
                video.play().catch(e => console.log("User interaction required for video"));
            }
        }

        // 2. Clothing Digital Rain
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const clothingIcons = ['👕', '👗', '🧥', '👖', '👟', '⚡'];
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00f3ff';
            ctx.font = fontSize + 'px Arial';

            for (let i = 0; i < drops.length; i++) {
                const text = clothingIcons[Math.floor(Math.random() * clothingIcons.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawRain, 50);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
