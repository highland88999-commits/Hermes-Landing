<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES LANDING - SHOP CLOTHING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --hologram-blue: #00f3ff;
            --black-bloom: rgba(0, 0, 0, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            user-select: none;
        }

        /* Fullscreen Video Background */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -2;
            filter: brightness(0.4) grayscale(0.3);
        }

        /* Digital Rain Canvas */
        #rain-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.5;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            padding: 20px;
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { color: #fff; letter-spacing: clamp(4px, 2vw, 10px); text-transform: uppercase; margin: 0; text-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }
        p { color: var(--hologram-blue); letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; margin-top: 10px; }

        /* 3-Column Responsive Grid */
        .icon-container { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 900px;
            width: 100%;
        }

        .hologram-card {
            aspect-ratio: 4/5;
            background: var(--black-bloom);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 15px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            position: relative;
        }

        .hologram-card:hover {
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
        }

        /* Video Masking */
        .video-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 75%;
            display: flex; align-items: center; justify-content: center;
        }

        .masked-video {
            width: 80%; height: 80%;
            object-fit: cover;
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px var(--hologram-blue));
        }

        /* SVG Mask Shapes */
        .mask-hoodie { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M212.7 11c3.9-7.1 11.4-11.4 19.3-11.4s15.4 4.3 19.3 11.4l192 352c3.9 7.1 3.9 15.6 0 22.6s-11.4 11.4-19.3 11.4H240v104c0 13.3-10.7 24-24 24s-24-10.7-24-24V397.4l-11.3 20.8c-3.9 7.1-11.4 11.4-19.3 11.4H24.4c-7.9 0-15.4-4.3-19.3-11.4s-3.9-15.6 0-22.6L212.7 11z"/></svg>'); }
        .mask-dress { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M224 512c35.3 0 64-28.7 64-64H160c0 35.3 28.7 64 64 64zM32 416H416c17.7 0 32-14.3 32-32s-14.3-32-32-32H32c-17.7 0-32 14.3-32 32s14.3 32 32 32z"/></svg>'); }
        .mask-plus { -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32V224H48c-17.7 0-32 14.3-32 32s14.3 32 32 32H192V432c0 17.7 14.3 32 32 32s32-14.3 32-32V288H400c17.7 0 32-14.3 32-32s-14.3-32-32-32H256V80z"/></svg>'); }

        .label {
            position: absolute;
            bottom: 15%;
            color: #fff;
            font-size: 0.65rem;
            letter-spacing: 3px;
            opacity: 0.8;
            text-align: center;
        }

        /* Mobile Fix */
        @media (max-width: 768px) {
            .icon-container { grid-template-columns: 1fr; max-width: 200px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body onclick="igniteExperience()">

    <video muted loop playsinline id="bg-video">
        <source src="https://github.com/highland88999-commits/Hermes-Landing/blob/main/media/grok_video_2026-03-11-17-05-08.mp4?raw=true" type="video/mp4">
    </video>

    <canvas id="rain-canvas"></canvas>

    <div class="overlay">
        <header>
            <h1>HERMES LANDING</h1>
            <p>Select your brand below</p>
        </header>

        <div class="icon-container">
            <a href="https://olympus-lac.vercel.app/" class="hologram-card">
                <div class="video-mask">
                    <video muted loop playsinline class="masked-video mask-hoodie">
                        <source src="https://github.com/highland88999-commits/Hermes-Landing/blob/main/media/grok_video_2026-03-11-17-05-08.mp4?raw=true" type="video/mp4">
                    </video>
                </div>
                <div class="label">OLYMPUS</div>
            </a>

            <a href="https://missacccom.pxf.io/oNq1Po" class="hologram-card">
                <div class="video-mask">
                    <video muted loop playsinline class="masked-video mask-dress">
                        <source src="https://github.com/highland88999-commits/Hermes-Landing/blob/main/media/grok_video_2026-03-11-17-05-08.mp4?raw=true" type="video/mp4">
                    </video>
                </div>
                <div class="label">BRIDAL</div>
            </a>

            <a href="#" class="hologram-card" style="opacity: 0.6;">
                <div class="video-mask">
                    <video muted loop playsinline class="masked-video mask-plus">
                        <source src="https://github.com/highland88999-commits/Hermes-Landing/blob/main/media/grok_video_2026-03-11-17-05-08.mp4?raw=true" type="video/mp4">
                    </video>
                </div>
                <div class="label">EXPANDING</div>
            </a>
        </div>
    </div>

    <script>
        // 1. Digital Rain System
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const gear = ['👕', '👗', '⚡', '🧥', '👖'];
        const fontSize = 18;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawRain() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f3ff';
            ctx.font = fontSize + 'px Arial';

            drops.forEach((y, i) => {
                const char = gear[Math.floor(Math.random() * gear.length)];
                ctx.fillText(char, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawRain, 50);

        // 2. Global Ignition Trigger
        function igniteExperience() {
            const allVideos = document.querySelectorAll('video');
            allVideos.forEach(v => {
                v.play().catch(e => console.log("Playback interaction initiated"));
            });
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
