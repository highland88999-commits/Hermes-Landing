    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        // 6 Custom Colors
        const galaxyColors = [0x00ffff, 0xbc13fe, 0xff00ff, 0x00ff00, 0xffaa00, 0xff0000];
        let colorIndex = 0;
        const targetColor = new THREE.Color(galaxyColors[0]);

        // Background Particles
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 25000; i++) vertices.push(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000));
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 1.2, transparent: true, opacity: 0.7 });
        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);

        // Eye of Horus (Gold and Silver SVG texture)
        const svgEye = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
              <defs>
                <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFD700" />
                  <stop offset="50%" stop-color="#C0C0C0" />
                  <stop offset="100%" stop-color="#DAA520" />
                </linearGradient>
                <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              </defs>
              <g stroke="url(#gs)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
                <path d="M 20 40 Q 90 10 180 50" />
                <path d="M 30 70 Q 100 30 170 80" />
                <path d="M 30 70 Q 100 100 170 80" />
                <circle cx="100" cy="65" r="15" fill="url(#gs)" />
                <path d="M 100 90 L 100 140" />
                <path d="M 100 90 C 80 120 50 120 40 100" />
              </g>
            </svg>`;
        const eyeUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgEye);
        const textureLoader = new THREE.TextureLoader();
        const eyeTexture = textureLoader.load(eyeUri);
        const eyeMaterial = new THREE.SpriteMaterial({ map: eyeTexture, color: 0xffffff });
        const horusEye = new THREE.Sprite(eyeMaterial);
        horusEye.scale.set(300, 225, 1);
        scene.add(horusEye);

        scene.add(new THREE.PointLight(0x00ffff, 4, 4000)); scene.add(new THREE.AmbientLight(0x111111));
        camera.position.z = 1200;

        // Auto change color every 10 seconds
        setInterval(() => {
            colorIndex = (colorIndex + 1) % galaxyColors.length;
            targetColor.setHex(galaxyColors[colorIndex]);
        }, 10000);

        function animate() { 
            requestAnimationFrame(animate); 
            // Slowly rotate entire particle field
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            
            // Smoothly lerp towards target color
            material.color.lerp(targetColor, 0.015);

            renderer.render(scene, camera); 
        }
        animate();

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
    </script>

            kids: [
                { n: "PBS Kids", u: "https://pbskids.org" },
                { n: "NatGeo: Rocks", u: "https://kids.nationalgeographic.com/science/article/rocks-and-minerals" },
                { n: "Peppa Pig", u: "https://peppapig.com" }
            ]
        };

        const sidebar = document.getElementById('sidebar');

        categories.forEach(cat => {
            sidebar.innerHTML += `<a class="menu-link" id="link-${cat.id}" onclick="showSection('${cat.id}')">${olympusIcon} ${cat.name}</a>`;
        });

        // VORTEX CLOCKWISE GENERATOR MATRIX
        function initCardParticles(canvas, uniqueSeed) {
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            const seedVal = uniqueSeed.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const maxParticles = 80 + (seedVal % 40); // Increased particle count
            const particles = [];

            function resize() {
                if (!canvas.isConnected) return;
                canvas.width = canvas.offsetWidth || 180;
                canvas.height = canvas.offsetHeight || 110;
            }
            resize();

            for (let i = 0; i < maxParticles; i++) {
                particles.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: Math.random() * (canvas.width / 1.2),
                    speed: 0.005 + (Math.random() * 0.015), // Clockwise angular velocity
                    wobbleOffset: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.03,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.3,
                    alphaSpeed: 0.005 + (Math.random() * 0.005)
                });
            }

            function frame() {
                if (!canvas.isConnected) {
                    cancelAnimationFrame(animationFrameId);
                    return;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, 'rgba(0, 255, 255, 0.15)');
                grad.addColorStop(1, 'rgba(188, 19, 254, 0.05)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    
                    // Vortex logic
                    p.angle += p.speed; 
                    p.wobbleOffset += p.wobbleSpeed;
                    const currentRadius = p.radius + Math.sin(p.wobbleOffset) * 15;
                    
                    p.x = cx + Math.cos(p.angle) * currentRadius;
                    p.y = cy + Math.sin(p.angle) * currentRadius;

                    // Fade pulsing
                    p.alpha += p.alphaSpeed;
                    if (p.alpha > 0.85 || p.alpha < 0.2) p.alphaSpeed = -p.alphaSpeed;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 255, ${Math.abs(p.alpha)})`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#00ffff';
                    ctx.fill();
                    ctx.shadowBlur = 0; 
                }
                animationFrameId = requestAnimationFrame(frame);
            }
            frame();
            window.addEventListener('resize', resize);
        }

        async function showSection(id) {
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            const terminal = document.getElementById('submission-terminal');
            
            document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active-link'));
            const activeLink = document.getElementById(`link-${id}`);
            if(activeLink) activeLink.classList.add('active-link');
            
            const categoryName = categories.find(c => c.id === id)?.name || id;
            indicator.innerHTML = `${olympusIconLarge} ${categoryName} ${olympusIconLarge}`;
            grid.innerHTML = '';
            
            const staticLinks = linkData[id] || [];
            staticLinks.forEach((item, index) => {
                const subtextHtml = item.s ? `<div class="sub-label">${item.s}</div>` : '';
                grid.innerHTML += `
                <a href="${item.u}" target="_blank" class="hologram-card">
                    <div class="particle-box">
                        <canvas class="card-particle-canvas" id="canvas-${id}-${index}"></canvas>
                    </div>
                    <div class="label-container">
                        <div class="label">${olympusIcon} ${item.n}</div>
                        ${subtextHtml}
                    </div>
                </a>`;
            });

            staticLinks.forEach((item, index) => {
                const cv = document.getElementById(`canvas-${id}-${index}`);
                if (cv) initCardParticles(cv, item.n);
            });

            if (id === 'core') {
                terminal.style.display = 'block';
            } else {
                terminal.style.display = 'none';
            }

            if(window.innerWidth < 1100 && sidebar.classList.contains('active')) toggleSidebar();
        }

        function searchMall() {
            const query = document.getElementById('mallSearch').value.toLowerCase();
            const grid = document.getElementById('mallGrid');
            const indicator = document.getElementById('cat-indicator');
            const terminal = document.getElementById('submission-terminal');
            
            if(query.length > 0) {
                indicator.innerHTML = `${olympusIconLarge} Global Search Override ${olympusIconLarge}`;
                terminal.style.display = 'none';
                document.querySelectorAll('.menu-link').forEach(el => el.classList.remove('active-link'));
                grid.innerHTML = '';
                
                const matches = [];
                Object.values(linkData).flat().forEach(item => {
                    if(item.n.toLowerCase().includes(query)) {
                        matches.push(item);
                    }
                });

                matches.forEach((item, index) => {
                    const subtextHtml = item.s ? `<div class="sub-label">${item.s}</div>` : '';
                    grid.innerHTML += `
                    <a href="${item.u}" target="_blank" class="hologram-card">
                        <div class="particle-box">
                            <canvas class="card-particle-canvas" id="search-canvas-${index}"></canvas>
                        </div>
                        <div class="label-container">
                            <div class="label">${olympusIcon} ${item.n}</div>
                            ${subtextHtml}
                        </div>
                    </a>`;
                });

                matches.forEach((item, index) => {
                    const cv = document.getElementById(`search-canvas-${index}`);
                    if (cv) initCardParticles(cv, item.n);
                });
            } else {
                showSection('core');
            }
        }

        function toggleSidebar() { sidebar.classList.toggle('active'); }

        function processGateway(gateway) {
            const nameInput = document.getElementById('newLinkName').value.trim();
            const urlInput = document.getElementById('newLinkUrl').value.trim();
            if (!nameInput || !urlInput) return alert("⚠️ MULTIVERSE ERROR: Designation and Protocol required.");
            try { new URL(urlInput); } catch (e) { return alert("⚠️ Invalid URL. Must include https://"); }

            const encodedName = encodeURIComponent(nameInput);
            const encodedUrl = encodeURIComponent(urlInput);
            if (gateway === 'stripe') {
                const stripeBase = "https://buy.stripe.com/eVqaEWeI74KEddqbhgcIE03";
                window.open(`${stripeBase}?prefilled_custom_field_value[0]=${encodedName}&prefilled_custom_field_value[1]=${encodedUrl}`, '_blank');
            } else if (gateway === 'crypto') {
                const cryptoBase = "https://nowpayments.io/payment/?iid=5817172284";
                window.open(`${cryptoBase}&order_id=${encodedName}&order_description=${encodedUrl}`, '_blank');
            }
            document.getElementById('newLinkName').value = '';
            document.getElementById('newLinkUrl').value = '';
        }

        window.onload = () => showSection('core');
    </script>
</body>
