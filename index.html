    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 1, 10000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('galaxy-canvas'), antialias:true, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);

        const galaxyColors = [0x00ffff, 0xbc13fe, 0xff00ff, 0x00ff00, 0xffaa00, 0xff0000];
        let colorIndex = 0;
        const targetColor = new THREE.Color(galaxyColors[0]);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 25000; i++) vertices.push(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000));
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00ffff, size: 1.2, transparent: true, opacity: 0.7 });
        const particlesMesh = new THREE.Points(geometry, material);
        scene.add(particlesMesh);

        scene.add(new THREE.PointLight(0x00ffff, 4, 4000)); scene.add(new THREE.AmbientLight(0x111111));
        camera.position.z = 1200;

        setInterval(() => {
            colorIndex = (colorIndex + 1) % galaxyColors.length;
            targetColor.setHex(galaxyColors[colorIndex]);
        }, 10000);

        function animate() { 
            requestAnimationFrame(animate); 
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            material.color.lerp(targetColor, 0.015);
            renderer.render(scene, camera); 
        }
        animate();

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        });
    </script>

        function initCardParticles(canvas, uniqueSeed) {
            const ctx = canvas.getContext('2d');
            let animationFrameId;

            const seedVal = uniqueSeed.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const maxParticles = 80 + (seedVal % 40);
            const particles = [];

            function resize() {
                if (!canvas.isConnected) return;
                canvas.width = canvas.offsetWidth || 180;
                canvas.height = canvas.offsetHeight || 110;
            }
            resize();

            for (let i = 0; i < maxParticles; i++) {
                particles.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: Math.random() * (canvas.width / 1.2),
                    speed: 0.005 + (Math.random() * 0.015),
                    wobbleOffset: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.03,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.3,
                    alphaSpeed: 0.005 + (Math.random() * 0.005)
                });
            }

            function frame() {
                if (!canvas.isConnected) {
                    cancelAnimationFrame(animationFrameId);
                    return;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, 'rgba(0, 255, 255, 0.15)');
                grad.addColorStop(1, 'rgba(188, 19, 254, 0.05)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    
                    p.angle += p.speed; 
                    p.wobbleOffset += p.wobbleSpeed;
                    const currentRadius = p.radius + Math.sin(p.wobbleOffset) * 15;
                    
                    p.x = cx + Math.cos(p.angle) * currentRadius;
                    p.y = cy + Math.sin(p.angle) * currentRadius;

                    p.alpha += p.alphaSpeed;
                    if (p.alpha > 0.85 || p.alpha < 0.2) p.alphaSpeed = -p.alphaSpeed;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 255, ${Math.abs(p.alpha)})`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#00ffff';
                    ctx.fill();
                    ctx.shadowBlur = 0; 
                }
                animationFrameId = requestAnimationFrame(frame);
            }
            frame();
            window.addEventListener('resize', resize);
        }

        // --- SWIPE GESTURE LOGIC ---
        let touchStartX = 0;
        let touchEndX = 0;
        const viewport = document.getElementById('viewport');

        viewport.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        viewport.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 60; // Minimum distance to register a swipe
            if (touchEndX < touchStartX - swipeThreshold) {
                // Swiped Left -> Go to Next Category
                let nextIndex = currentCategoryIndex + 1;
                if (nextIndex >= categories.length) nextIndex = 0;
                showSection(categories[nextIndex].id);
            }
            if (touchEndX > touchStartX + swipeThreshold) {
                // Swiped Right -> Go to Previous Category
                let prevIndex = currentCategoryIndex - 1;
                if (prevIndex < 0) prevIndex = categories.length - 1;
                showSection(categories[prevIndex].id);
            }
        }

        function getSafeVisitorId() {
            let id = localStorage.getItem('nexus_visitor_id');
            if (!id) {
                if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                    id = crypto.randomUUID();
                } else {
                    id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                        const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                        return v.toString(16);
                    });
                }
                localStorage.setItem('nexus_visitor_id', id);
            }
            return id;
        }

        async function updateMultiverseCount(isInitialLoad = false) {
            const displayElement = document.getElementById('counter-display');
            try {
                const visitorId = getSafeVisitorId();

                if (isInitialLoad) {
                    await supabaseClient.rpc('track_ping', { p_ip_hash: visitorId });
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                const { data: globalData } = await supabaseClient.from('global_stats').select('total_pings').single();
                const { count: uniqueCount } = await supabaseClient.from('unique_visitors').select('*', { count: 'exact', head: true });

                const total = globalData ? globalData.total_pings : 0;
                const unique = uniqueCount !== null ? uniqueCount : 0;
                
                displayElement.innerHTML = `
                    UNIQUE TRAVERSALS: [ <span style="color: #ff00ff; text-shadow: 0 0 10px #ff00ff;">${unique}</span> ] 
                    <span style="opacity: 0.5; margin: 0 10px;">///</span> 
                    TOTAL PINGS: [ <span style="color: #00ffff;">${total}</span> ]
                `;
                displayElement.classList.remove('loading');

            } catch (error) {
                console.error('Uplink failed:', error);
                displayElement.innerHTML = `MULTIVERSE NODE: [ <span style="color: #ff3366;">OFFLINE</span> ]`;
                displayElement.classList.remove('loading');
            }
        }

        window.addEventListener('load', () => {
            updateMultiverseCount(true);
            setInterval(() => updateMultiverseCount(false), 60000);
